name: Build Windows App

on:
  push:
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Bump version in .csproj
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        $tag = "${{ github.ref_name }}" -replace '^v', ''
        $csproj = "SFTracker/SFTracker.csproj"
        (Get-Content $csproj) -replace '<Version>.*</Version>', "<Version>$tag</Version>" | Set-Content $csproj
        Write-Host "Version set to $tag"

    - name: Build & Publish
      run: |
        dotnet publish SFTracker/SFTracker.csproj `
          -c Release `
          -r win-x64 `
          --self-contained `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -o dist

    - name: Rename output
      run: Move-Item dist/SFTracker.exe dist/SFT-Tracker-Setup.exe

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SFT-Tracker-Setup
        path: dist/SFT-Tracker-Setup.exe

    - name: Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/SFT-Tracker-Setup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Notify Backend
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        $ver = "${{ github.ref_name }}" -replace '^v', ''
        $body = @{
          version = $ver
          url = "https://github.com/Prefect1109/satisfactory-pm-windows/releases/download/${{ github.ref_name }}/SFT-Tracker-Setup.exe"
          force_update = $false
        } | ConvertTo-Json
        Invoke-RestMethod -Uri "https://satisfactory.kaffka.tech/api/admin/client/version" `
          -Method POST `
          -ContentType "application/json" `
          -Headers @{ "x-admin-token" = "${{ secrets.ADMIN_TOKEN }}" } `
          -Body $body
