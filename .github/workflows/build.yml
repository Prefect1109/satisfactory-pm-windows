name: Build Windows App

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install "flet[all]" pyinstaller

    - name: Build with flet pack
      run: |
        flet pack main.py --name SFT-Tracker-Setup

    - name: Show dist structure
      run: Get-ChildItem -Path dist -Recurse | Select-Object FullName

    - name: Find and copy exe
      run: |
        $exe = Get-ChildItem -Path dist -Recurse -Filter "SFT-Tracker-Setup.exe" | Select-Object -First 1
        if (-not $exe) {
          $exe = Get-ChildItem -Path dist -Recurse -Filter "*.exe" | Select-Object -First 1
        }
        Write-Host "Found: $($exe.FullName)"
        Copy-Item $exe.FullName -Destination "dist\SFT-Tracker-Setup.exe" -Force

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SFT-Tracker-Setup
        path: dist/SFT-Tracker-Setup.exe

    - name: Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/SFT-Tracker-Setup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Notify Backend
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        curl -X POST https://satisfactory.kaffka.tech/api/admin/client/version `
          -H "Content-Type: application/json" `
          -H "x-admin-token: ${{ secrets.ADMIN_TOKEN }}" `
          -d "{\"version\": \"${{ github.ref_name }}\", \"url\": \"https://github.com/Prefect1109/satisfactory-pm-windows/releases/download/${{ github.ref_name }}/SFT-Tracker-Setup.exe\", \"force_update\": false}"
