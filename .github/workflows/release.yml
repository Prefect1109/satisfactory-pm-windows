name: Release

on:
  push:
    tags: [ 'v*' ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore SFTracker.Tests/SFTracker.Tests.csproj

    - name: Test
      run: dotnet test SFTracker.Tests/SFTracker.Tests.csproj --no-restore --logger "console;verbosity=normal"

  build:
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Bump version in .csproj
      run: |
        $tag = "${{ github.ref_name }}" -replace '^v', ''
        $csproj = "SFTracker/SFTracker.csproj"
        (Get-Content $csproj) -replace '<Version>.*</Version>', "<Version>$tag</Version>" | Set-Content $csproj
        Write-Host "Version set to $tag"

    - name: Build & Publish
      run: |
        dotnet publish SFTracker/SFTracker.csproj `
          -c Release `
          -r win-x64 `
          --self-contained `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -o dist

    - name: Prepare MSIX layout
      run: |
        $ver = ("${{ github.ref_name }}" -replace '^v', '') + ".0"
        # Patch version and publisher CN in manifest
        (Get-Content SFTracker/Package.appxmanifest) `
          -replace 'Version="1\.0\.0\.0"', "Version=`"$ver`"" `
          -replace 'CN=PUBLISHER_CN_PLACEHOLDER', "CN=${{ secrets.PUBLISHER_CN }}" `
          | Set-Content dist/AppxManifest.xml
        # Copy assets
        New-Item -ItemType Directory -Path dist/Assets -Force | Out-Null
        Copy-Item assets/msix/Square44x44Logo.png   dist/Assets/
        Copy-Item assets/msix/Square150x150Logo.png dist/Assets/
        Copy-Item assets/msix/StoreLogo.png         dist/Assets/
        Copy-Item assets/msix/Wide310x150Logo.png   dist/Assets/
        Copy-Item assets/msix/SplashScreen.png      dist/Assets/

    - name: Create MSIX
      run: |
        $sdk = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Directory |
          Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } |
          Sort-Object { [Version]$_.Name } -Descending |
          Select-Object -First 1
        $makeappx = Join-Path $sdk.FullName "x64\makeappx.exe"
        & $makeappx pack /d dist/ /p SFT-Tracker.msix /nv
        Write-Host "Created SFT-Tracker.msix"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SFT-Tracker-MSIX
        path: SFT-Tracker.msix

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: SFT-Tracker.msix
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
