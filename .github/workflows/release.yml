name: Release

on:
  push:
    tags: [ 'v*' ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore SFTracker.Tests/SFTracker.Tests.csproj

    - name: Test
      run: dotnet test SFTracker.Tests/SFTracker.Tests.csproj --no-restore --logger "console;verbosity=normal"

  build:
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Bump version in .csproj
      run: |
        $tag = "${{ github.ref_name }}" -replace '^v', ''
        $csproj = "SFTracker/SFTracker.csproj"
        (Get-Content $csproj) -replace '<Version>.*</Version>', "<Version>$tag</Version>" | Set-Content $csproj
        Write-Host "Version set to $tag"

    - name: Build & Publish
      run: |
        dotnet publish SFTracker/SFTracker.csproj `
          -c Release `
          -r win-x64 `
          --self-contained `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -o dist

    - name: Rename output
      run: Move-Item dist/SFTracker.exe dist/SFT-Tracker-Setup.exe

    - name: Upload unsigned artifact
      id: upload
      uses: actions/upload-artifact@v4
      with:
        name: SFT-Tracker-Setup-unsigned
        path: dist/SFT-Tracker-Setup.exe

    - name: Sign with SignPath
      uses: signpath/github-action-submit-signing-request@v1
      with:
        api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
        organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
        project-slug: sft-tracker
        signing-policy-slug: release-signing
        artifact-configuration-slug: exe
        github-artifact-id: ${{ steps.upload.outputs.artifact-id }}
        wait-for-completion: true
        output-artifact-directory: dist/signed

    - name: Replace with signed artifact
      run: Move-Item dist/signed/SFT-Tracker-Setup.exe dist/SFT-Tracker-Setup.exe -Force

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/SFT-Tracker-Setup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Notify Backend
      run: |
        $ver = "${{ github.ref_name }}" -replace '^v', ''
        $body = @{
          version = $ver
          url = "https://github.com/Prefect1109/satisfactory-pm-windows/releases/download/${{ github.ref_name }}/SFT-Tracker-Setup.exe"
          force_update = $false
        } | ConvertTo-Json
        Invoke-RestMethod -Uri "https://satisfactory.kaffka.tech/api/admin/client/version" `
          -Method POST `
          -ContentType "application/json" `
          -Headers @{ "x-admin-token" = "${{ secrets.ADMIN_TOKEN }}" } `
          -Body $body
